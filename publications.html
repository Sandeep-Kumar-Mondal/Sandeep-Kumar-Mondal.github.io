<!DOCTYPE html>
<html>

<head>

<title>Publications</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Inter&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
max-width:900px;
margin:60px auto;
line-height:1.7;
background:#f8fafc;
}

h1{
font-family:'Playfair Display',serif;
margin-bottom:30px;
}

li{
margin-bottom:18px;
}

a{
text-decoration:none;
color:#0f766e;
}

a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<h1>Publications</h1>

<ul id="papers">
Loading publications...
</ul>

<script>

const inspireID = "1991836";

/* Fetch papers */

fetch(`https://inspirehep.net/api/literature?q=author.recid:${inspireID}&sort=mostrecent&size=20`)
.then(response => response.json())
.then(data => {

let papers = data.hits.hits;
let html = "";

papers.forEach(paper => {

let title = paper.metadata.titles?.[0]?.title || "Untitled";

let year = paper.metadata.publication_info?.[0]?.year || "";

let authors = paper.metadata.authors
? paper.metadata.authors.slice(0,3).map(a => a.full_name).join(", ") + " et al."
: "";

let link = paper.links.html;

html += `
<li>
<strong>${authors}</strong><br>
<a href="${link}" target="_blank">${title}</a> (${year})
</li>
`;

});

document.getElementById("papers").innerHTML = html;

});

</script>

</body>

</html>
