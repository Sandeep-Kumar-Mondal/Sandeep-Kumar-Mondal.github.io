<script>

let isOpen=false;

function toggleNav(){

let sidebar=document.getElementById("sidebar");
let main=document.getElementById("main");

if(!isOpen){

sidebar.style.width="260px";
main.style.marginLeft="260px";

isOpen=true;

}else{

sidebar.style.width="0";

/* DO NOT RESET marginLeft → prevents left shift */

isOpen=false;

}

}

/* SORTING (UNCHANGED BUT CLEANED) */

let sortState = {};

function sortTable(tableId, type){

let table = document.getElementById(tableId);
let tbody = table.querySelector("tbody");
let rows = Array.from(tbody.querySelectorAll("tr"));

let key = tableId + type;
let asc = sortState[key] = !sortState[key];

rows.sort((a,b)=>{
let valA = type==="year" ? +a.dataset.year : +a.dataset.cite;
let valB = type==="year" ? +b.dataset.year : +b.dataset.cite;
return asc ? valA - valB : valB - valA;
});

tbody.innerHTML="";
rows.forEach((row,i)=>{
row.cells[0].innerText=i+1;
tbody.appendChild(row);
});

}

</script>
